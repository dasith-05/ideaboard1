<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spark | Reveal Ideaboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --accent: #00f2fe;
            --bg-dark: #0f172a;
            --card-glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* Background Animation */
        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            filter: blur(140px);
            opacity: 0.15;
            border-radius: 50%;
            animation: float 25s infinite alternate ease-in-out;
        }

        .blob-2 {
            bottom: -150px;
            right: -100px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            animation-delay: -7s;
        }

        @keyframes float {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(150px, 100px) rotate(30deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 span { color: var(--primary); -webkit-text-fill-color: initial; }

        /* Input Section */
        .input-section {
            display: flex;
            align-items: center;
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            padding: 12px;
            border-radius: 28px;
            max-width: 800px;
            margin: 0 auto 50px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .input-section input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 15px;
            font-size: 1.05rem;
            font-family: inherit;
        }

        .name-input { 
            width: 160px; 
            font-weight: 600; 
            color: var(--accent); 
            border-right: 1px solid var(--border-glass) !important; 
        }

        .idea-input { flex: 1; }

        .add-btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 15px 35px;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 20px rgba(139, 92, 246, 0.4); }

        /* Grid */
        #board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        /* HOVER REVEAL CARD LOGIC */
        .card {
            background: var(--card-glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 35px;
            height: 250px;
            padding: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Initial State: Show Name & Avatar */
        .card-front {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            transition: all 0.5s ease;
            opacity: 1;
            transform: scale(1);
        }

        .big-avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card-front h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
        }

        /* Hidden State: The Idea Content */
        .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 35px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .card-back p {
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 300;
            color: #f1f5f9;
        }

        /* HOVER ACTION */
        .card:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-10px);
        }

        .card:hover .card-front {
            opacity: 0;
            transform: scale(0.8);
        }

        .card:hover .card-back {
            opacity: 1;
            transform: translateY(0);
        }

        /* Metadata & Utils */
        .date-tag {
            position: absolute;
            bottom: 20px;
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .remove-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #475569;
            z-index: 10;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .remove-btn:hover { color: var(--secondary); transform: scale(1.2); }

        @media (max-width: 600px) {
            .input-section { flex-direction: column; }
            .name-input { width: 100%; border: none !important; border-bottom: 1px solid var(--border-glass) !important; }
            .add-btn { width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div class="background-blobs">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>IdeaHUB<span>.</span></h1>
            <p style="color: #94a3b8;">Hover over a creator to reveal their idea.</p>
        </header>

        <div class="input-section">
            <input type="text" id="userName" placeholder="Your Name" class="name-input">
            <input type="text" id="ideaInput" placeholder="Enter your idea..." class="idea-input">
            <button class="add-btn" onclick="addIdea()">Add Spark</button>
        </div>

        <main id="board">
            </main>
    </div>

    <script>
        const ideaInput = document.getElementById('ideaInput');
        const userNameInput = document.getElementById('userName');
        const board = document.getElementById('board');

        let ideas = JSON.parse(localStorage.getItem('hover_ideas')) || [];

        function render() {
            board.innerHTML = '';
            
            if (ideas.length === 0) {
                board.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:#475569; padding:50px; border:2px dashed var(--border-glass); border-radius:30px;">Empty board. Start the conversation.</div>`;
            }

            ideas.forEach((idea, index) => {
                const initials = idea.author ? idea.author.charAt(0).toUpperCase() : '?';
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="remove-btn" onclick="event.stopPropagation(); deleteIdea(${index})">&times;</span>
                    
                    <div class="card-front">
                        <div class="big-avatar">${initials}</div>
                        <h3>${idea.author}</h3>
                        <span style="font-size: 0.8rem; color: var(--primary); font-weight: 600;">VIEW IDEA</span>
                    </div>

                    <div class="card-back">
                        <p>"${idea.text}"</p>
                        <span class="date-tag">${idea.date}</span>
                    </div>
                `;
                board.appendChild(card);
            });

            localStorage.setItem('hover_ideas', JSON.stringify(ideas));
        }

        function addIdea() {
            const text = ideaInput.value.trim();
            const author = userNameInput.value.trim();

            if (!text || !author) {
                alert("Please fill in both name and idea.");
                return;
            }

            const newIdea = {
                text: text,
                author: author,
                date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
            };

            ideas.unshift(newIdea);
            
            // Clear both inputs
            ideaInput.value = '';
            userNameInput.value = '';
            
            render();
        }

        function deleteIdea(index) {
            ideas.splice(index, 1);
            render();
        }

        ideaInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addIdea();
        });

        render();
    </script>
</body>
</html>
