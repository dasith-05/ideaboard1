<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Ideaboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">💡 Idea<span>Flow</span></div>
            <nav>
                <div class="nav-item active">All Ideas</div>
                <div class="nav-item">Favorites</div>
                <div class="nav-item">Archive</div>
            </nav>
            <div class="stats">
                <p>Total Ideas</p>
                <h2 id="ideaCount">0</h2>
            </div>
        </aside>

        <main class="content">
            <header>
                <div class="search-bar">
                    <input type="text" id="ideaInput" placeholder="Capture a spark of genius...">
                    <button id="addBtn">Create</button>
                </div>
            </header>

            <div id="board" class="masonry-grid">
                </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
